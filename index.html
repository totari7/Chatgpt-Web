<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테마 사진 공유 페이지</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .card {
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="hero bg-dark text-white py-5 d-flex justify-content-center align-items-center">
        <div class="text-center">
            <h1 class="display-4">테마 사진 공유 페이지</h1>
            <p class="lead">여행, 건축, 산과 관련된 아름다운 사진을 공유합니다</p>
        </div>
    </div>

    <div style="height: 50px;"></div>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <img src="https://picsum.photos/400/300?random=1" class="card-img-top" alt="Travel Image">
                    <div class="card-body">
                        <h5 class="card-title">여행 사진</h5>
                        <p class="card-text">다양한 여행지의 아름다운 풍경을 담은 사진입니다.</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="https://picsum.photos/400/300?random=2" class="card-img-top" alt="Architecture Image">
                    <div class="card-body">
                        <h5 class="card-title">건축 사진</h5>
                        <p class="card-text">독특하고 아름다운 건축물을 담은 사진입니다.</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="https://picsum.photos/400/300?random=3" class="card-img-top" alt="Mountain Image">
                    <div class="card-body">
                        <h5 class="card-title">산 사진</h5>
                        <p class="card-text">장엄한 산과 자연의 경치를 담은 사진입니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
