<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT 웹페이지 만들기</title>
    <link rel="stylesheet" href="https://s3.ap-northeast-2.amazonaws.com/materials.spartacodingclub.kr/easygpt/default.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <style>
        /* 스타일 */
        .card {
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="hero bg-dark text-white py-5 d-flex justify-content-center align-items-center">
        <div class="text-center">
            <h1 class="display-4">totari 사진공유 페이지</h1>
            <p class="lead">한양대학교 사진을 공유합니다</p>
        </div>
    </div>

    <!-- 공백 추가 -->
    <div style="height: 50px;"></div>

    <!-- 구성요소 -->
    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1581310472507-ccd10f7eb9f9?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwzNjUyOXwwfDF8c2VhcmNofHx1bml2ZXJzaXR5JTJDY2FtcHVzfGVufDB8fHx8MTYwOTY1MDEwMA&ixlib=rb-1.2.1&q=80&w=400" class="card-img-top" alt="School Image 1">
                    <div class="card-body">
                        <h5 class="card-title">한양대학교 사진</h5>
                        <h6 class="card-subtitle mb-2 text-muted">대학생활 사진</h6>
                        <p class="card-text">한양대학교의 아름다운 캠퍼스와 건물을 담은 사진입니다.</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1573496774214-38e2566e42aa?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwzNjUyOXwwfDF8c2VhcmNofHx1bml2ZXJzaXR5JTJDc3R1ZGVudHN8ZW58MHx8fHwxNjA5NjUwMTAw&ixlib=rb-1.2.1&q=80&w=400" class="card-img-top" alt="School Image 2">
                    <div class="card-body">
                        <h5 class="card-title">한양대학교 사진</h5>
                        <h6 class="card-subtitle mb-2 text-muted">학교생활 사진</h6>
                        <p class="card-text">한양대학교의 다양한 행사와 학교 생활을 담은 사진입니다.</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1596495577886-d920f6da5020?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwzNjUyOXwwfDF8c2VhcmNofHxzdHVkZW50c3x8fHx8MTYwOTY1MDEwMA&ixlib=rb-1.2.1&q=80&w=400" class="card-img-top" alt="School Image 3">
                    <div class="card-body">
                        <h5 class="card-title">한양대학교 사진</h5>
                        <h6 class="card-subtitle mb-2 text-muted">학생활동 사진</h6>
                        <p class="card-text">한양대학교의 학생들이 활동하는 모습을 담은 사진입니다.</p>
                    </div>
                </div>
            </div>
        </div>

</html>
