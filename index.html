<!doctype html>
<html lang="kr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatGPT 웹페이지 만들기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
    <style>
        /* 이미지 크기 동일화 */
        .card-img-top {
            height: 200px;
            object-fit: cover;
        }

        /* 카드 기본 효과 */
        .card {
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }

        /* 마우스 호버 시 효과 */
        .card:hover {
            transform: scale(1.05); /* 부드러운 확대 */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2); /* 그림자 추가 */
        }
    </style>
</head>

<body>
    <!-- Hero 섹션 -->
    <section class="bg-dark text-white py-5">
        <div class="container text-center">
            <h1 class="display-4">totari 사진공유 페이지</h1>
            <p class="lead">사진을 공유합니다</p>
        </div>
    </section>

    <!-- 구성요소 -->
    <section class="py-5">
        <div class="container">
            <div class="row row-cols-1 row-cols-md-3 g-4">
                <!-- 카드 1 -->
                <div class="col">
                    <div class="card h-100">
                        <img src="https://images.pexels.com/photos/158607/cairn-fog-mystical-background-158607.jpeg?auto=compress&cs=tinysrgb&w=400&h=300" 
                             class="card-img-top" alt="여행 사진 1">
                        <div class="card-body">
                            <h5 class="card-title">다양한 멋진 사진</h5>
                            <h6 class="card-subtitle mb-2 text-muted">여행 사진</h6>
                            <p class="card-text">아름다운 풍경을 담은 사진입니다.</p>
                        </div>
                    </div>
                </div>
                <!-- 카드 2 -->
                <div class="col">
                    <div class="card h-100">
                        <img src="https://images.pexels.com/photos/338515/pexels-photo-338515.jpeg?auto=compress&cs=tinysrgb&w=400&h=300" 
                             class="card-img-top" alt="여행 사진 2">
                        <div class="card-body">
                            <h5 class="card-title">다양한 멋진 사진</h5>
                            <h6 class="card-subtitle mb-2 text-muted">여행 사진</h6>
                            <p class="card-text">아름다운 풍경을 담은 사진입니다.</p>
                        </div>
                    </div>
                </div>
                <!-- 카드 3 -->
                <div class="col">
                    <div class="card h-100">
                        <img src="https://images.pexels.com/photos/356378/pexels-photo-356378.jpeg?auto=compress&cs=tinysrgb&w=400&h=300" 
                             class="card-img-top" alt="여행 사진 3">
                        <div class="card-body">
                            <h5 class="card-title">다양한 멋진 사진</h5>
                            <h6 class="card-subtitle mb-2 text-muted">여행 사진</h6>
                            <p class="card-text">아름다운 풍경을 담은 사진입니다.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
